general:
  instance_name: "IdeaForge Search"
  debug: false

server:
  secret_key: "ideaforge-searxng-local-secret-key-2026"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

search:
  safe_search: 0
  default_lang: "all"
  autocomplete: ""
  formats:
    - html
    - json

ui:
  static_use_hash: true

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false

  - name: stackoverflow
    engine: stackoverflow
    shortcut: st
    disabled: false

  - name: arxiv
    engine: arxiv
    shortcut: arx
    disabled: false
