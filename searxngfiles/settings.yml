# =============================================================================
# SearXNG Deep Search Configuration
# Optimized for programmatic/AI agent deep research use cases
# =============================================================================

use_default_settings: false

general:
  debug: false
  instance_name: "DeepSearch Engine"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: true

brand:
  new_issue_url: ""
  docs_url: ""
  public_instances: ""

search:
  # Güvenli arama (0=kapalı, 1=orta, 2=katı)
  safe_search: 0
  # Varsayılan dil (tüm diller)
  default_lang: "auto"
  # Otomatik tamamlama kaynağı
  autocomplete: "google"
  autocomplete_min: 2
  # Varsayılan sonuç sayısı — deep search için yüksek
  # Ban koruması — boş sorgu engelleme
  ban_time_on_fail: 5
  # Maksimum sayfa
  max_page: 0

server:
  port: 8080
  bind_address: "0.0.0.0"
  base_url: false
  # Gizli anahtar — .env dosyasından gelecek
  secret_key: "change-me-to-a-strong-secret-key"
  limiter: true
  public_instance: false
  # Görüntü proxy — gizlilik için
  image_proxy: true
  # HTTP protokolü
  method: "POST"
  default_http_headers:
    X-Content-Type-Options: nosniff
    X-Download-Options: noopen
    X-Robots-Tag: noindex, nofollow
    Referrer-Policy: no-referrer

# Redis bağlantısı
redis:
  url: "redis://redis:6379/0"

ui:
  # Varsayılan tema
  default_theme: simple
  # Statik dosyalar
  static_use_hash: true
  # Arama sırasında sonuç formatları
  default_locale: "tr"
  # Sonsuz kaydırma
  infinite_scroll: true
  # Sorgu bölümü
  query_in_title: true
  # Sonuç açma şekli
  results_on_new_tab: true
  # Tema
  theme_args:
    simple_style: dark

# =============================================================================
# OUTGOING — HTTP istek ayarları (arama motorlarına yapılan istekler)
# =============================================================================
outgoing:
  # İstek zaman aşımı (saniye) — deep search için yüksek
  request_timeout: 10.0
  # Maksimum istek sayısı (paralel)
  max_request_timeout: 15.0
  # Bağlantı havuzu boyutu
  pool_connections: 100
  pool_maxsize: 20
  # DNS önbellek süresi (saniye)
  # keepalive bağlantıları
  keepalive_expiry: 5.0
  # Proxy ayarları (opsiyonel — Tor veya özel proxy)
  # proxies:
  #   all://:
  #     - socks5h://tor:9050
  #     - http://proxy1:8080
  #     - http://proxy2:8080
  # Kullanıcı ajanları — rotasyon ile tespit engelleme
  useragent_suffix: ""
  # Kaynak IP adresi (opsiyonel)
  # source_ips:
  #   - "1.2.3.4"

