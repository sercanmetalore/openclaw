# SearXNG settings override for local deepsearch deployment.
# Keep this file minimal to stay compatible with new upstream SearXNG releases.

use_default_settings: true

general:
  debug: false
  instance_name: "DeepSearch Engine"
  enable_metrics: true

search:
  safe_search: 0
  default_lang: "auto"
  autocomplete: "google"
  autocomplete_min: 2
  formats:
    - html
    - json

server:
  port: 8080
  bind_address: "0.0.0.0"
  base_url: false
  secret_key: "change-me-to-a-strong-secret-key"
  limiter: false
  public_instance: false
  image_proxy: true
  method: "GET"

redis:
  url: "redis://redis:6379/0"
